<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image to PDF Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@600;900&display=swap" rel="stylesheet"/>

<style>
:root{
  --gold:#c9a84c;
  --gold2:#f0d080;
  --border:rgba(201,168,76,0.3);
  --bg:#07070e;
  --panel:rgba(20,20,35,0.95);
  --text:#e8dfc8;
  --muted:#9a8860;
}

body{
  margin:0;
  font-family:'Amiri',serif;
  background:var(--bg);
  color:var(--text);
  text-align:center;
}

/* HEADER STYLE SAME AS YOUR SITE */
h1{
  font-family:'Cinzel',serif;
  color:var(--gold2);
  margin:25px 0;
  letter-spacing:2px;
}

.box{
  max-width:700px;
  margin:auto;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:20px;
  backdrop-filter:blur(10px);
}

/* INPUT BUTTONS */
input{
  margin:10px 0;
  color:var(--text);
}

.btn{
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  border:none;
  padding:10px 15px;
  border-radius:25px;
  cursor:pointer;
  font-weight:bold;
  margin:5px;
  font-family:'Cinzel',serif;
}

/* PREVIEW GRID */
.grid{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin-top:15px;
}

.item{
  position:relative;
}

.item img{
  width:110px;
  height:110px;
  object-fit:cover;
  border-radius:10px;
  border:1px solid var(--border);
}

/* DELETE BTN */
.del{
  position:absolute;
  top:2px;
  right:2px;
  background:red;
  color:#fff;
  border:none;
  border-radius:50%;
  width:20px;
  height:20px;
  font-size:12px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🖼️ Image to PDF PRO</h1>

<div class="box">

  <!-- IMAGE SELECT -->
  <input type="file" id="file" accept="image/*" multiple>

  <!-- CAMERA SUPPORT -->
  <input type="file" id="cam" accept="image/*" capture="environment">

  <br>

  <button class="btn" onclick="convert()">Convert PDF</button>

  <div class="grid" id="grid"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let images=[];

const file=document.getElementById('file');
const cam=document.getElementById('cam');
const grid=document.getElementById('grid');

file.onchange=e=>handle(e.target.files);
cam.onchange=e=>handle(e.target.files);

function handle(files){
  for(let f of files){
    let r=new FileReader();
    r.onload=e=>{
      images.push(e.target.result);
      render();
    }
    r.readAsDataURL(f);
  }
}

function render(){
  grid.innerHTML="";
  images.forEach((img,i)=>{
    let div=document.createElement('div');
    div.className="item";

    div.innerHTML=`
      <img src="${img}">
      <button class="del" onclick="removeImg(${i})">×</button>
    `;
    grid.appendChild(div);
  });
}

function removeImg(i){
  images.splice(i,1);
  render();
}

function convert(){
  if(images.length==0){
    alert("Select images first");
    return;
  }

  const { jsPDF }=window.jspdf;
  const pdf=new jsPDF();

  let done=0;

  images.forEach((src,i)=>{
    let img=new Image();
    img.src=src;

    img.onload=()=>{
      const w=pdf.internal.pageSize.getWidth();
      const h=(img.height*w)/img.width;

      if(i!=0) pdf.addPage();
      pdf.addImage(img,'JPEG',0,0,w,h);

      done++;
      if(done==images.length){
        pdf.save("images.pdf");
      }
    }
  });
}
</script>

</body>
</html>
