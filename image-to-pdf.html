<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image to PDF</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@600;900&display=swap" rel="stylesheet"/>

<style>
:root{
  --gold:#c9a84c;
  --gold2:#f0d080;
  --border:rgba(201,168,76,0.3);
  --bg:#07070e;
  --panel:rgba(20,20,35,0.95);
  --text:#e8dfc8;
  --muted:#9a8860;
  --input-bg:rgba(255,255,255,0.04);
}

/* BACKGROUND SAME STYLE */
body{
  margin:0;
  font-family:'Amiri',serif;
  background:var(--bg);
  color:var(--text);
  text-align:center;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%,rgba(201,168,76,0.08),transparent 65%);
}

/* HEADER */
h1{
  font-family:'Cinzel',serif;
  color:var(--gold2);
  margin:30px 0 10px;
  letter-spacing:2px;
}

/* CARD */
.box{
  max-width:650px;
  margin:20px auto;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:25px;
  backdrop-filter:blur(10px);
}

/* INPUT */
input{
  margin:15px 0;
  padding:10px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--input-bg);
  color:var(--text);
  width:90%;
}

/* BUTTON */
button{
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  border:none;
  padding:12px 18px;
  border-radius:25px;
  cursor:pointer;
  font-weight:bold;
  font-family:'Cinzel',serif;
  margin-top:10px;
  transition:.3s;
}

button:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 20px rgba(201,168,76,0.3);
}

/* PREVIEW */
.preview{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin-top:15px;
}

.preview img{
  width:100px;
  height:100px;
  object-fit:cover;
  border-radius:10px;
  border:1px solid var(--border);
  box-shadow:0 0 10px rgba(201,168,76,0.15);
}
</style>
</head>

<body>

<h1>🖼️ Image to PDF</h1>

<div class="box">

  <input type="file" id="images" multiple accept="image/*">

  <div class="preview" id="preview"></div>

  <button onclick="convertPDF()">Convert to PDF</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const input = document.getElementById("images");
const preview = document.getElementById("preview");
let imgs = [];

input.addEventListener("change", function(){
  preview.innerHTML="";
  imgs=[];

  Array.from(this.files).forEach(file=>{
    const reader=new FileReader();

    reader.onload=e=>{
      imgs.push(e.target.result);

      let img=document.createElement("img");
      img.src=e.target.result;
      preview.appendChild(img);
    }

    reader.readAsDataURL(file);
  });
});

function convertPDF(){
  if(imgs.length===0){
    alert("Select images first");
    return;
  }

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  let loaded=0;

  imgs.forEach((src,i)=>{
    let img=new Image();
    img.src=src;

    img.onload=()=>{
      const w=pdf.internal.pageSize.getWidth();
      const h=(img.height*w)/img.width;

      if(i!==0) pdf.addPage();
      pdf.addImage(img,"JPEG",0,0,w,h);

      loaded++;
      if(loaded===imgs.length){
        pdf.save("image-to-pdf.pdf");
      }
    }
  });
}
</script>

</body>
</html>
